name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi uvicorn httpx websockets pydantic
      - name: Compile Python modules
        run: |
          python -m py_compile src/aetherbrowser/*.py src/extension/native_messaging/*.py
      - name: Run focused tests
        run: |
          pytest -q tests/aetherbrowser/test_model_bridge.py tests/aetherbrowser/test_serve.py tests/test_native_messaging_host.py

  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node deps
        run: npm install
      - name: Run extension tests
        run: npm run test:extension
